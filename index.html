<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>調整様</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f7fb}
.panel{background:#fff;padding:16px;margin-bottom:16px;border-radius:12px}
button{padding:8px 12px;margin:4px;background:#2563eb;color:#fff;border:none;border-radius:6px}
input,select{padding:6px}
</style>
</head>
<body>

<div class="panel">
<h2>候補日</h2>
<input type="date" id="newDate">
<input type="time" id="newTime" value="18:00">
<button id="addC">追加</button>
<div id="candidateList"></div>
</div>

<div class="panel">
<h2>参加者</h2>
<button id="addP">追加</button>
<div id="participantList"></div>
</div>

<div class="panel">
<h2>回答</h2>
<div id="table"></div>
</div>

<div class="panel">
<h2>結果</h2>
<div id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* ===== Firebase設定 ===== */
const firebaseConfig = {
  apiKey: "ここに貼る",
  authDomain: "ここに貼る",
  projectId: "ここに貼る",
  storageBucket: "ここに貼る",
  messagingSenderId: "ここに貼る",
  appId: "ここに貼る"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== state ===== */
const state = {
  candidates: [],
  participants: [],
  responses: {}
};

function uid(){ return Math.random().toString(36).slice(2,9); }

/* ===== eventId ===== */
function getEventId(){
  const url = new URL(location.href);
  let id = url.searchParams.get("event");
  if(!id){
    id = Math.random().toString(36).slice(2);
    url.searchParams.set("event", id);
    location.href = url.toString();
  }
  return id;
}
const eventId = getEventId();

/* ===== Firestore ===== */
async function save(){
  await setDoc(doc(db,"events",eventId), state);
}

async function load(){
  const snap = await getDoc(doc(db,"events",eventId));
  if(snap.exists()){
    Object.assign(state, snap.data());
    render();
  }
}

/* ===== ロジック ===== */
function ensure(){
  state.participants.forEach(p=>{
    if(!state.responses[p.id]) state.responses[p.id]={};
    state.candidates.forEach(c=>{
      if(!state.responses[p.id][c.id]) state.responses[p.id][c.id]='maybe';
    });
  });
}

/* ===== render ===== */
function render(){
  ensure();

  // 候補日
  let chtml='';
  state.candidates.forEach(c=>{
    chtml += `<div>${c.date} ${c.time}</div>`;
  });
  candidateList.innerHTML = chtml;

  // 参加者
  let phtml='';
  state.participants.forEach(p=>{
    phtml += `<div>
      <input value="${p.name}" data-id="${p.id}">
    </div>`;
  });
  participantList.innerHTML = phtml;

  document.querySelectorAll('[data-id]').forEach(input=>{
    input.oninput=()=>{
      const t=state.participants.find(p=>p.id===input.dataset.id);
      t.name=input.value;
      renderTable();
      renderResult();
      save();
    }
  });

  renderTable();
  renderResult();
}

/* ===== table ===== */
function renderTable(){
  let html='<table border="1"><tr><th></th>';
  state.candidates.forEach(c=>{
    html+=`<th>${c.date}<br>${c.time}</th>`;
  });
  html+='</tr>';

  state.participants.forEach(p=>{
    html+=`<tr><td>${p.name}</td>`;
    state.candidates.forEach(c=>{
      const v=state.responses[p.id][c.id];
      html+=`<td><select data="${p.id}|${c.id}">
        <option value="ok" ${v==='ok'?'selected':''}>○</option>
        <option value="maybe" ${v==='maybe'?'selected':''}>△</option>
        <option value="ng" ${v==='ng'?'selected':''}>×</option>
      </select></td>`;
    });
    html+='</tr>';
  });
  html+='</table>';

  table.innerHTML=html;

  document.querySelectorAll('select[data]').forEach(s=>{
    s.onchange=()=>{
      const [pid,cid]=s.getAttribute('data').split('|');
      state.responses[pid][cid]=s.value;
      renderResult();
      save();
    }
  });
}

/* ===== result ===== */
function renderResult(){
  const res=state.candidates.map(c=>{
    let score=0;
    state.participants.forEach(p=>{
      const v=state.responses[p.id][c.id];
      if(v==='ok') score+=2;
      if(v==='maybe') score+=1;
      if(v==='ng') score-=2;
    });
    return {c,score};
  }).sort((a,b)=>b.score-a.score);

  if(res.length){
    result.innerHTML = `${res[0].c.date} ${res[0].c.time} が最適 (score:${res[0].score})`;
  }
}

/* ===== イベント ===== */
addC.onclick=()=>{
  const d=newDate.value;
  const t=newTime.value;
  if(!d) return;
  state.candidates.push({id:uid(),date:d,time:t});
  render();
  save();
};

addP.onclick=()=>{
  state.participants.push({id:uid(),name:"参加者"});
  render();
  save();
};

/* ===== 起動 ===== */
load();
render();

</script>
</body>
</html>
