<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>調整様｜誰も揉めない日程、出します</title>
  <style>
    :root{--bg:#f5f7fb;--panel:#fff;--line:#d9e0ea;--text:#1c2430;--sub:#667085;--accent:#2563eb;--ok:#16a34a;--maybe:#d97706;--ng:#dc2626;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:16px}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--text);background:var(--bg)}
    .app{max-width:1200px;margin:0 auto;padding:16px}
    .panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
    h1,h2{margin:0 0 8px}
    .small{color:var(--sub);font-size:13px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px}
    button{padding:10px 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer}
    .ghost{background:#fff;color:#000;border:1px solid var(--line)}
    .danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #eee;padding:8px}
    .ok{color:var(--ok)} .maybe{color:var(--maybe)} .ng{color:var(--ng)}
  </style>
</head>
<body>
<div class="app">
  <div class="panel">
    <h1>調整様</h1>
    <div class="small">Firestore対応版（簡易）</div>
  </div>

  <div class="panel">
    <h2>設定</h2>
    <input id="eventTitle" placeholder="件名">
    <textarea id="eventDescription"></textarea>
    <select id="modeSelect">
      <option value="important">偉い人優先</option>
      <option value="flat">フラット</option>
      <option value="organizer">幹事最適</option>
    </select>
  </div>

  <div class="panel">
    <h2>候補日</h2>
    <input type="date" id="newD">
    <input type="time" id="newT">
    <button id="addC">追加</button>
    <div id="candidateList"></div>
  </div>

  <div class="panel">
    <h2>参加者</h2>
    <button id="addP">追加</button>
    <div id="participantList"></div>
  </div>

  <div class="panel">
    <h2>回答</h2>
    <div id="table"></div>
  </div>

  <div class="panel">
    <h2>結果</h2>
    <div id="result"></div>
  </div>
</div>

<script>
const state={title:'',desc:'',mode:'important',candidates:[],participants:[],responses:{}};

function uid(){return Math.random().toString(36).slice(2,9)}

function ensureResponses(){
  state.participants.forEach(p=>{
    if(!state.responses[p.id]) state.responses[p.id]={};
    state.candidates.forEach(c=>{
      if(!state.responses[p.id][c.id]) state.responses[p.id][c.id]='maybe';
    });
  });
}

function render(){
  ensureResponses();
  renderCandidates();
  renderParticipants();
  renderTable();
  renderResult();
}

function renderCandidates(){
  const el=document.getElementById('candidateList'); el.innerHTML='';
  state.candidates.forEach(c=>{
    el.innerHTML+=`<div>${c.date} ${c.time}</div>`;
  });
}

function renderParticipants(){
  const el=document.getElementById('participantList'); el.innerHTML='';
  state.participants.forEach(p=>{
    el.innerHTML+=`<div>${p.name}</div>`;
  });
}

function renderTable(){
  let html='<table><tr><th></th>';
  state.candidates.forEach(c=>html+=`<th>${c.date}<br><span class="small">${c.time || ''}</span></th>`);
  html+='</tr>';
  state.participants.forEach(p=>{
    html+=`<tr><td>${p.name}</td>`;
    state.candidates.forEach(c=>{
      const v=state.responses[p.id][c.id];
      html+=`<td><select data="${p.id}|${c.id}">
        <option value="ok" ${v==='ok'?'selected':''}>○</option>
        <option value="maybe" ${v==='maybe'?'selected':''}>△</option>
        <option value="ng" ${v==='ng'?'selected':''}>×</option>
      </select></td>`;
    });
    html+='</tr>';
  });
  html+='</table>';
  document.getElementById('table').innerHTML=html;

  document.querySelectorAll('select[data]').forEach(s=>{
    s.onchange=()=>{
      const [pid,cid]=s.getAttribute('data').split('|');
      state.responses[pid][cid]=s.value;
      renderResult();
    };
  });
}

function renderResult(){
  const res=state.candidates.map(c=>{
    let score=0;
    state.participants.forEach(p=>{
      const v=state.responses[p.id][c.id];
      if(v==='ok') score+=2;
      if(v==='maybe') score+=1;
      if(v==='ng') score-=2;
    });
    return {c,score};
  }).sort((a,b)=>b.score-a.score);

  if(!res.length) return;
  document.getElementById('result').innerHTML=
    `${res[0].c.date} が最も揉めにくいです (score:${res[0].score})`;
}

// events
document.getElementById('addC').onclick=()=>{
  const d=newD.value; const t=newT.value;
  if(!d) return;
  state.candidates.push({id:uid(),date:d,time:t});
  render();
};

document.getElementById('addP').onclick=()=>{
  state.participants.push({id:uid(),name:'参加者'+(state.participants.length+1)});
  render();
};

document.getElementById('modeSelect').onchange=e=>{
  state.mode=e.target.value;
  render();
};

render();
</script>
</body>
</html>
