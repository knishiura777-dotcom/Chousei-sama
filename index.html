<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>調整様（完全版） v0.1.0</title>
<style>
  :root{
    --bg:#f5f7fb;--panel:#fff;--line:#d9e0ea;--text:#1c2430;--sub:#667085;--accent:#2563eb;
    --ok:#166534;--warn:#92400e;--err:#b91c1c;--ok-bg:#dcfce7;--warn-bg:#ffedd5;--err-bg:#fee2e2;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:sans-serif;background:var(--bg);padding:20px;color:var(--text)}
  .app{max-width:1100px;margin:0 auto}
  .panel{background:#fff;padding:16px;margin-bottom:16px;border-radius:10px;border:1px solid var(--line)}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
  .title-wrap h1{margin:0 0 6px}
  .small{font-size:13px;color:var(--sub)}
  .status-inline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:700;background:#f8fafc;color:#334155;white-space:nowrap}
  .status-pill.ok{background:var(--ok-bg);color:var(--ok);border-color:#bbf7d0}
  .status-pill.warn{background:var(--warn-bg);color:var(--warn);border-color:#fed7aa}
  .status-pill.err{background:var(--err-bg);color:var(--err);border-color:#fecaca}
  .status-dot{width:8px;height:8px;border-radius:999px;background:currentColor;display:inline-block}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  input,textarea,select{width:100%;padding:8px;margin:4px 0;border:1px solid var(--line);border-radius:8px;background:#fff}
  button{padding:8px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer}
  .danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .list-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #eef2f7}
  .participant-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;margin-bottom:8px}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line)}
  th,td{border-bottom:1px solid #edf2f7;padding:8px;text-align:left;vertical-align:middle}
  th{background:#f8fafc}
  .result-box{padding:14px;border-radius:10px;background:#eff6ff;border:1px solid #bfdbfe;line-height:1.7}
  @media (max-width:800px){.grid2,.participant-row,.topbar{grid-template-columns:1fr;display:block}.status-inline{justify-content:flex-start;margin-top:10px}table{display:block;overflow-x:auto}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title-wrap">
      <h1>調整様</h1>
      <div class="small">version <span id="versionLabel">0.1.0</span></div>
    </div>
    <div class="status-inline">
      <div id="statusPill" class="status-pill"><span class="status-dot"></span><span id="statusText">未接続</span></div>
      <div class="small">event: <span id="eventLabel">-</span></div>
    </div>
  </div>

  <div class="panel">
    <h2>予定情報</h2>
    <div class="grid2">
      <div><input id="title" placeholder="予定名（例：研究打ち合わせ）"></div>
      <div><input id="location" placeholder="場所 / URL"></div>
    </div>
    <div class="grid2">
      <div><input id="deadline" type="datetime-local"></div>
      <div><input id="organizer" placeholder="幹事名"></div>
    </div>
    <textarea id="desc" placeholder="説明"></textarea>
  </div>

  <div class="panel">
    <h2>候補日</h2>
    <div class="row">
      <input type="date" id="d" style="max-width:220px">
      <input type="time" id="t" value="18:00" style="max-width:160px">
      <button id="addC" type="button">追加</button>
    </div>
    <div id="cList"></div>
  </div>

  <div class="panel">
    <h2>参加者</h2>
    <button id="addP" type="button">追加</button>
    <div id="pList" style="margin-top:10px"></div>
  </div>

  <div class="panel">
    <h2>回答</h2>
    <div id="table"></div>
  </div>

  <div class="panel">
    <h2>結果</h2>
    <div id="result" class="result-box">候補日を入力してください。</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const APP_VERSION = "0.1.0";

const firebaseConfig = {
  apiKey: "AIzaSyBTXGKYfhPoPqOwgwzoC78N1R7f0He67j0",
  authDomain: "chousei-sama-85eed.firebaseapp.com",
  projectId: "chousei-sama-85eed",
  storageBucket: "chousei-sama-85eed.firebasestorage.app",
  messagingSenderId: "547215861134",
  appId: "1:547215861134:web:67d95b90375aea65ceb0df"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let isApplyingRemote = false;
let saveTimer = null;
let firstSnapshot = true;

function uid(){return Math.random().toString(36).slice(2,9)}

function getEventId(){
  const url=new URL(location.href);
  let id=url.searchParams.get("event");
  if(!id){
    id=Math.random().toString(36).slice(2);
    url.searchParams.set("event",id);
    history.replaceState({},"",url.toString());
  }
  return id;
}
const eventId=getEventId();

document.getElementById("versionLabel").textContent = APP_VERSION;
document.getElementById("eventLabel").textContent = eventId;

function setCompactStatus(text, kind=""){
  const pill = document.getElementById("statusPill");
  const textEl = document.getElementById("statusText");
  textEl.textContent = text;
  pill.className = `status-pill ${kind}`.trim();
}

const state={
  appVersion: APP_VERSION,
  title:"",
  location:"",
  deadline:"",
  organizer:"",
  desc:"",
  candidates:[],
  participants:[],
  responses:{}
};

function ensure(){
  state.participants.forEach(p=>{
    if(!state.responses[p.id]) state.responses[p.id]={};
    state.candidates.forEach(c=>{
      if(!state.responses[p.id][c.id]) state.responses[p.id][c.id]='maybe';
    });
    Object.keys(state.responses[p.id]).forEach(cid=>{
      if(!state.candidates.some(c=>c.id===cid)) delete state.responses[p.id][cid];
    });
  });
  Object.keys(state.responses).forEach(pid=>{
    if(!state.participants.some(p=>p.id===pid)) delete state.responses[pid];
  });
}

function serializeState(){
  ensure();
  return {
    appVersion: APP_VERSION,
    title: state.title,
    location: state.location,
    deadline: state.deadline,
    organizer: state.organizer,
    desc: state.desc,
    candidates: state.candidates,
    participants: state.participants,
    responses: state.responses
  };
}

async function save(){
  if(isApplyingRemote) return;
  try{
    setCompactStatus("保存中", "warn");
    await setDoc(doc(db,"events",eventId), serializeState(), { merge:true });
    setCompactStatus("接続中", "ok");
  }catch(e){
    console.error(e);
    setCompactStatus("保存失敗", "err");
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 250);
}

function subscribe(){
  setCompactStatus("接続中...", "warn");
  onSnapshot(doc(db,"events",eventId), (snap)=>{
    try{
      if(snap.exists()){
        isApplyingRemote = true;
        Object.assign(state, snap.data());
        ensure();
        render();
        setCompactStatus(firstSnapshot ? "接続成功" : "同期中", "ok");
      }else{
        setCompactStatus("新規イベント", "ok");
      }
    }catch(e){
      console.error(e);
      setCompactStatus("描画エラー", "err");
    }finally{
      firstSnapshot = false;
      isApplyingRemote = false;
    }
  }, (error)=>{
    console.error(error);
    setCompactStatus("接続エラー", "err");
  });
}

function render(){
  ensure();
  title.value = state.title || "";
  location.value = state.location || "";
  deadline.value = state.deadline || "";
  organizer.value = state.organizer || "";
  desc.value = state.desc || "";

  cList.innerHTML = state.candidates.map((c, i)=>`<div class="list-item"><div><strong>候補${i+1}: ${c.date} ${c.time||""}</strong></div><button class="danger" type="button" data-cdel="${c.id}">削除</button></div>`).join("");
  document.querySelectorAll('[data-cdel]').forEach(btn=>{
    btn.onclick = ()=>{
      state.candidates = state.candidates.filter(c=>c.id!==btn.dataset.cdel);
      render();
      scheduleSave();
    };
  });

  pList.innerHTML = state.participants.map(p=>`<div class="participant-row"><input value="${(p.name||"").replaceAll('"','&quot;')}" data-pname="${p.id}" placeholder="参加者名"><span class="small">参加者</span><button class="danger" type="button" data-pdel="${p.id}">削除</button></div>`).join("");
  document.querySelectorAll('[data-pname]').forEach(input=>{
    input.oninput = ()=>{
      const target = state.participants.find(p=>p.id===input.dataset.pname);
      if(target){
        target.name = input.value;
        renderTable();
        renderResult();
        scheduleSave();
      }
    };
  });
  document.querySelectorAll('[data-pdel]').forEach(btn=>{
    btn.onclick = ()=>{
      state.participants = state.participants.filter(p=>p.id!==btn.dataset.pdel);
      delete state.responses[btn.dataset.pdel];
      render();
      scheduleSave();
    };
  });

  renderTable();
  renderResult();
}

function renderTable(){
  if(!state.candidates.length || !state.participants.length){
    table.innerHTML = '<div class="small">候補日と参加者を追加してください。</div>';
    return;
  }
  let html = '<table><thead><tr><th></th>';
  state.candidates.forEach(c=> html += `<th>${c.date}<br><span class="small">${c.time||""}</span></th>`);
  html += '</tr></thead><tbody>';
  state.participants.forEach(p=>{
    html += `<tr><td>${p.name||"参加者"}</td>`;
    state.candidates.forEach(c=>{
      const v = state.responses[p.id]?.[c.id] || 'maybe';
      html += `<td><select data-response="${p.id}|${c.id}"><option value="ok" ${v==='ok'?'selected':''}>○</option><option value="maybe" ${v==='maybe'?'selected':''}>△</option><option value="ng" ${v==='ng'?'selected':''}>×</option></select></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  table.innerHTML = html;
  document.querySelectorAll('[data-response]').forEach(select=>{
    select.onchange = ()=>{
      const [pid, cid] = select.dataset.response.split('|');
      state.responses[pid][cid] = select.value;
      renderResult();
      scheduleSave();
    };
  });
}

function calc(){
  return state.candidates.map(c=>{
    let score = 0;
    state.participants.forEach(p=>{
      const v = state.responses[p.id]?.[c.id];
      if(v==='ok') score += 2;
      if(v==='maybe') score += 1;
      if(v==='ng') score -= 2;
    });
    return { c, score };
  }).sort((a,b)=>b.score-a.score);
}

function renderResult(){
  const ranked = calc();
  if(!ranked.length){
    result.innerHTML = '候補日がありません。';
    return;
  }
  const top = ranked[0];
  result.innerHTML = `<strong>${state.title || '予定名未設定'}</strong><br>場所: ${state.location || '未設定'}<br>締切: ${state.deadline || '未設定'}<br>幹事: ${state.organizer || '未設定'}<br>保存データ版: ${state.appVersion || APP_VERSION}<br><br>👉 最適日: ${top.c.date} ${top.c.time || ''}`;
}

addC.onclick = ()=>{
  if(!d.value) return;
  state.candidates.push({ id: uid(), date: d.value, time: t.value || '18:00' });
  render();
  scheduleSave();
};

addP.onclick = ()=>{
  state.participants.push({ id: uid(), name: '参加者' });
  render();
  scheduleSave();
};

title.oninput = e=>{ state.title = e.target.value; renderResult(); scheduleSave(); };
location.oninput = e=>{ state.location = e.target.value; renderResult(); scheduleSave(); };
deadline.oninput = e=>{ state.deadline = e.target.value; renderResult(); scheduleSave(); };
organizer.oninput = e=>{ state.organizer = e.target.value; renderResult(); scheduleSave(); };
desc.oninput = e=>{ state.desc = e.target.value; scheduleSave(); };

render();
setCompactStatus("接続待機中", "warn");
subscribe();
</script>
</body>
</html>
