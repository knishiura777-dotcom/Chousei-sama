<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>調整様（リアルタイム版）</title>
<style>
body{font-family:sans-serif;background:#f5f7fb;padding:20px}
.panel{background:#fff;padding:16px;margin-bottom:16px;border-radius:10px}
input,textarea,select{width:100%;padding:8px;margin:4px 0}
button{padding:8px 12px;background:#2563eb;color:#fff;border:none;border-radius:6px}
</style>
</head>
<body>

<div class="panel">
<h2>予定情報</h2>
<input id="title" placeholder="予定名">
<input id="location" placeholder="場所">
<input id="deadline" type="datetime-local">
<input id="organizer" placeholder="幹事">
<textarea id="desc" placeholder="説明"></textarea>
</div>

<div class="panel">
<h2>候補日</h2>
<input type="date" id="d">
<input type="time" id="t" value="18:00">
<button id="addC">追加</button>
<div id="cList"></div>
</div>

<div class="panel">
<h2>参加者</h2>
<button id="addP">追加</button>
<div id="pList"></div>
</div>

<div class="panel">
<h2>回答</h2>
<div id="table"></div>
</div>

<div class="panel">
<h2>結果</h2>
<div id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* ===== Firebase設定（あなたの値） ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBTXGKYfhPoPqOwgwzoC78N1R7f0He67j0",
  authDomain: "chousei-sama-85eed.firebaseapp.com",
  projectId: "chousei-sama-85eed",
  storageBucket: "chousei-sama-85eed.firebasestorage.app",
  messagingSenderId: "547215861134",
  appId: "1:547215861134:web:67d95b90375aea65ceb0df"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== ID ===== */
function uid(){return Math.random().toString(36).slice(2,9)}

function getEventId(){
  const url=new URL(location.href);
  let id=url.searchParams.get("event");
  if(!id){
    id=Math.random().toString(36).slice(2);
    url.searchParams.set("event",id);
    location.href=url;
  }
  return id;
}
const eventId=getEventId();

/* ===== state ===== */
const state={
  title:"",
  location:"",
  deadline:"",
  organizer:"",
  desc:"",
  candidates:[],
  participants:[],
  responses:{}
};

/* ===== Firestore ===== */
async function save(){
  await setDoc(doc(db,"events",eventId),state);
}

function subscribe(){
  onSnapshot(doc(db,"events",eventId),(snap)=>{
    if(snap.exists()){
      Object.assign(state,snap.data());
      render();
    }
  });
}

/* ===== 補完 ===== */
function ensure(){
  state.participants.forEach(p=>{
    if(!state.responses[p.id]) state.responses[p.id]={};
    state.candidates.forEach(c=>{
      if(!state.responses[p.id][c.id]) state.responses[p.id][c.id]='maybe';
    });
  });
}

/* ===== render ===== */
function render(){
  ensure();

  title.value=state.title;
  location.value=state.location;
  deadline.value=state.deadline;
  organizer.value=state.organizer;
  desc.value=state.desc;

  cList.innerHTML=state.candidates.map(c=>`<div>${c.date} ${c.time}</div>`).join("");

  pList.innerHTML=state.participants.map(p=>
    `<input value="${p.name}" data="${p.id}">`
  ).join("");

  document.querySelectorAll('#pList input').forEach(i=>{
    i.oninput=()=>{
      state.participants.find(p=>p.id===i.dataset.id).name=i.value;
      renderTable();
      save();
    }
  });

  renderTable();
}

/* ===== table ===== */
function renderTable(){
  let html='<table border="1"><tr><th></th>';
  state.candidates.forEach(c=>html+=`<th>${c.date}<br>${c.time}</th>`);
  html+='</tr>';

  state.participants.forEach(p=>{
    html+=`<tr><td>${p.name}</td>`;
    state.candidates.forEach(c=>{
      const v=state.responses[p.id][c.id];
      html+=`<td><select data="${p.id}|${c.id}">
      <option value="ok" ${v==='ok'?'selected':''}>○</option>
      <option value="maybe" ${v==='maybe'?'selected':''}>△</option>
      <option value="ng" ${v==='ng'?'selected':''}>×</option>
      </select></td>`;
    });
    html+='</tr>';
  });

  html+='</table>';
  table.innerHTML=html;

  document.querySelectorAll('select').forEach(s=>{
    s.onchange=()=>{
      const [p,c]=s.dataset.split('|');
      state.responses[p][c]=s.value;
      calc();
      save();
    }
  });

  calc();
}

/* ===== 計算 ===== */
function calc(){
  const res=state.candidates.map(c=>{
    let score=0;
    state.participants.forEach(p=>{
      const v=state.responses[p.id][c.id];
      if(v==='ok') score+=2;
      if(v==='maybe') score+=1;
      if(v==='ng') score-=2;
    });
    return {c,score};
  }).sort((a,b)=>b.score-a.score);

  if(res.length){
    result.innerHTML=`
      <strong>${state.title || '予定名未設定'}</strong><br>
      場所: ${state.location || '未設定'}<br>
      締切: ${state.deadline || '未設定'}<br>
      幹事: ${state.organizer || '未設定'}<br><br>
      👉 最適日: ${res[0].c.date} ${res[0].c.time}
    `;
  }
}

/* ===== イベント ===== */
addC.onclick=()=>{
  if(!d.value) return;
  state.candidates.push({id:uid(),date:d.value,time:t.value});
  render();
  save();
};

addP.onclick=()=>{
  state.participants.push({id:uid(),name:"参加者"});
  render();
  save();
};

title.oninput=e=>{state.title=e.target.value; save();}
location.oninput=e=>{state.location=e.target.value; save();}
deadline.oninput=e=>{state.deadline=e.target.value; save();}
organizer.oninput=e=>{state.organizer=e.target.value; save();}
desc.oninput=e=>{state.desc=e.target.value; save();}

/* ===== 起動 ===== */
subscribe();
render();

</script>
</body>
</html>
